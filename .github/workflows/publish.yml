name: Publish quality-passed editions
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Publish only quality-passed channels
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily publish
      - run: touch site/.nojekyll
      - name: Persist published status
        run: |
          git config user.name "ian-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data site
          git diff --cached --quiet || git commit -m "publish: daily site"
          git pull --rebase origin main
          git push origin HEAD:main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
