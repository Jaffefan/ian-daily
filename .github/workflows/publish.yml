name: Publish verified daily editions
on:
  schedule:
    - cron: "1 1 * * *"
    - cron: "11 1 * * *"
    - cron: "21 1 * * *"
    - cron: "31 1 * * *"
    - cron: "41 1 * * *"
    - cron: "51 1 * * *"
  workflow_dispatch:
    inputs:
      rebuild:
        description: Rebuild today's published pages
        type: boolean
        default: true
jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: ian-daily-publish
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - id: prepare
        name: Prepare without changing published state
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: |
          python -m ian_daily prepare-release ${{ inputs.rebuild && '--rebuild' || '' }}
          python -c "import json; print('ready=' + str(bool(json.load(open('data/release_manifest.json'))['episode_ids'])).lower())" >> "$GITHUB_OUTPUT"
      - if: steps.prepare.outputs.ready == 'true'
        run: touch site/.nojekyll
      - if: steps.prepare.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify desktop and mobile site behavior
        if: steps.prepare.outputs.ready == 'true'
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
          npm run test:site
      - if: steps.prepare.outputs.ready == 'true'
        uses: actions/configure-pages@v5
      - if: steps.prepare.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        if: steps.prepare.outputs.ready == 'true'
        uses: actions/deploy-pages@v4
      - name: Verify public pages and audio
        if: steps.prepare.outputs.ready == 'true'
        run: python -m ian_daily verify-release
      - name: Finalize state and notify Feishu
        if: steps.prepare.outputs.ready == 'true'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily finalize-release
      - name: Persist verified release
        if: steps.prepare.outputs.ready == 'true'
        run: |
          git config user.name "ian-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data site
          git diff --cached --quiet || git commit -m "publish: verified daily site"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Notify overdue channels after final retry
        if: always() && github.event.schedule == '51 1 * * *'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily notify-overdue
      - name: Persist overdue notification ledger
        if: always() && github.event.schedule == '51 1 * * *'
        run: |
          git config user.name "ian-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "ops: persist overdue notification"
          git pull --rebase origin main
          git push origin HEAD:main
