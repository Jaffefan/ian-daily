name: Generate daily editions
on:
  push:
    branches:
      - main
    paths:
      - "ian_daily/agents.py"
      - "ian_daily/sources.py"
      - "ian_daily/selection.py"
  schedule:
    - cron: "30 22 * * *"
    - cron: "50 22 * * *"
    - cron: "10 23 * * *"
  workflow_dispatch:
    inputs:
      force:
        type: boolean
        default: false
      category:
        description: Optional single channel (tech, education, sports)
        type: string
        default: ""
jobs:
  generate:
    concurrency:
      group: ian-daily-generate
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Production preflight
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily doctor --notify
      - name: Generate three independent channels
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event.schedule }}" == "30 22 * * *" ]]; then
            python -m ian_daily generate ${{ inputs.category && format('--category {0}', inputs.category) || '' }} ${{ inputs.force && '--force' || '' }}
          else
            python -m ian_daily retry-failed
          fi
      - name: Report channel failures
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily notify-failures
      - name: Commit generated drafts and run ledger
        if: always()
        run: |
          git config user.name "ian-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "generate: daily editions"
          git pull --rebase origin main
          git push origin HEAD:main
