name: Generate daily editions
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      force:
        type: boolean
        default: false
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate three independent channels
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python -m ian_daily generate ${{ inputs.force && '--force' || '' }}
      - name: Commit generated drafts
        run: |
          git config user.name "ian-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "generate: daily editions"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Report channel failures
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -m ian_daily notify-failures
